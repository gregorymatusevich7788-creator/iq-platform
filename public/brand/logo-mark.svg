<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Geometric IQ mark: two overlapping rectangles forming a bold "IQ" monogram -->
  <rect width="40" height="40" rx="10" fill="#2563eb"/>
  <!-- I bar -->
  <rect x="10" y="10" width="4" height="20" rx="2" fill="white"/>
  <!-- Q circle + tail -->
  <circle cx="26" cy="20" r="8" stroke="white" stroke-width="3.5" fill="none"/>
  <line x1="31" y1="27" x2="36" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
